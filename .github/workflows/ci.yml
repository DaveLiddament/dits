name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: "PHP ${{ matrix.php-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: bcmath, intl, zip, simplexml, libxml
          tools: composer:v2
          coverage: xdebug

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: locked

      - name: Install vendor-bin tools
        run: composer bin all install

      - name: Run CI checks
        run: composer ci
